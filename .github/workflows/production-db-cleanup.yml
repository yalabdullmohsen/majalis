name: Production DB Cleanup

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "artifacts/majalis/lib/production/purge-runner.mjs"
      - "artifacts/majalis/lib/api-handlers/cron/purge-test-content.js"
      - "artifacts/majalis/scripts/purge-test-content.mjs"
      - "artifacts/majalis/scripts/verify-fawaid-clean.mjs"
      - ".github/workflows/production-db-cleanup.yml"

concurrency:
  group: production-db-cleanup
  cancel-in-progress: false

env:
  MAJALIS_PRODUCTION_URL: https://www.majlisilm.com

jobs:
  purge-and-verify:
    name: Purge misclassified fawaid
    if: github.repository == 'yalabdullmohsen/majalis'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Dry-run via production API
        run: |
          resp=$(curl -sf -X POST "$MAJALIS_PRODUCTION_URL/api/cron/purge-test-content?dryRun=1" \
            -H "x-vercel-cron: 1" -H "Accept: application/json")
          echo "$resp" | tee purge-dry-run.json
          echo "$resp" | grep -q '"ok":true' || echo "::warning::Dry-run returned non-ok (endpoint may not be deployed yet)"

      - name: Apply purge via production API
        run: |
          resp=$(curl -sf -X POST "$MAJALIS_PRODUCTION_URL/api/cron/purge-test-content?apply=1" \
            -H "x-vercel-cron: 1" -H "Accept: application/json")
          echo "$resp" | tee purge-apply.json
          echo "$resp" | grep -q '"ok":true' || (echo "::error::Production purge failed"; exit 1)
          echo "$resp" | grep -q '"bad":0' || (echo "::error::Fawaid still has blocked rows after purge"; exit 1)

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Verify fawaid clean (local script)
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "Skip local verify — using production API result from purge-apply.json"
            grep -q '"bad":0' purge-apply.json
            exit $?
          fi
          cd artifacts/majalis
          node scripts/verify-fawaid-clean.mjs
