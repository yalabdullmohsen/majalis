name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs for the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: |
          pnpm run typecheck:libs
          pnpm --filter @workspace/majalis run typecheck

      - name: Lint
        run: pnpm -r --if-present run lint

      - name: Build
        run: pnpm --filter @workspace/majalis run build

      - name: Verify deploy output
        run: pnpm --filter @workspace/majalis run verify:deploy

  production-bootstrap:
    name: Self Bootstrap after deploy
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.repository == 'yalabdullmohsen/majalis'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for Vercel deploy
        run: sleep 90

      - name: Platform self-bootstrap
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          cd artifacts/majalis
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || { [ -z "$DATABASE_URL" ] && [ -z "$SUPABASE_ACCESS_TOKEN" ]; }; then
            echo "::warning::Self Bootstrap skipped — configure SUPABASE_SERVICE_ROLE_KEY and DATABASE_URL in GitHub secrets"
            pnpm run bootstrap:platform:status || true
            exit 0
          fi
          pnpm run bootstrap:platform

      - name: Trigger production cron bootstrap
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Skip cron trigger: CRON_SECRET not configured"
            exit 0
          fi
          curl -sf -H "Authorization: Bearer $CRON_SECRET" \
            "https://www.majlisilm.com/api/cron/platform-bootstrap?action=run" || true
