name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs for the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: |
          pnpm run typecheck:libs
          pnpm --filter @workspace/majalis run typecheck

      - name: Lint
        run: pnpm -r --if-present run lint

      - name: Build
        run: pnpm --filter @workspace/majalis run build

      - name: Verify deploy output
        run: pnpm --filter @workspace/majalis run verify:deploy
