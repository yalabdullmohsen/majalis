name: Production Bootstrap

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - "artifacts/majalis/lib/db-migrate.mjs"
      - "artifacts/majalis/lib/database.mjs"

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    if: github.repository == 'yalabdullmohsen/majalis'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install

      - name: Apply SQL migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          if [ -z "$DATABASE_URL" ] && [ -z "$SUPABASE_ACCESS_TOKEN" ] && [ -z "$POSTGRES_PASSWORD" ]; then
            echo "Skip: no DATABASE_URL / SUPABASE_ACCESS_TOKEN / POSTGRES_PASSWORD in GitHub secrets"
            exit 0
          fi
          cd artifacts/majalis
          node --input-type=module -e "
          import { applyMigrations, verifySchema } from './lib/db-migrate.mjs';
          const r = await applyMigrations({ continueOnError: false });
          const v = await verifySchema();
          console.log(JSON.stringify({ migrations: r, schema: v }, null, 2));
          if (!v.ok) process.exit(1);
          "

      - name: Trigger production bootstrap
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Skip: CRON_SECRET not in GitHub secrets"
            exit 0
          fi
          curl -sf -H "x-vercel-cron: 1" "https://www.majlisilm.com/api/cron/bootstrap-database" || \
          curl -sf -H "Authorization: Bearer $CRON_SECRET" "https://www.majlisilm.com/api/cron/bootstrap-database"
