name: Platform Self Bootstrap

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "artifacts/majalis/lib/platform-bootstrap.mjs"
      - "artifacts/majalis/lib/platform-seed.mjs"
      - "artifacts/majalis/supabase/**"
      - ".github/workflows/platform-bootstrap.yml"

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    if: github.repository == 'yalabdullmohsen/majalis'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install

      - name: Platform self-bootstrap status
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          cd artifacts/majalis
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || { [ -z "$DATABASE_URL" ] && [ -z "$SUPABASE_ACCESS_TOKEN" ]; }; then
            echo "Skip: configure SUPABASE_SERVICE_ROLE_KEY and DATABASE_URL (or SUPABASE_ACCESS_TOKEN) in GitHub secrets"
            pnpm run bootstrap:platform:status || true
            exit 0
          fi
          pnpm run bootstrap:platform

      - name: Trigger production cron bootstrap
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Skip cron trigger: CRON_SECRET not configured"
            exit 0
          fi
          curl -sf -H "Authorization: Bearer $CRON_SECRET" \
            "https://www.majlisilm.com/api/cron/platform-bootstrap?action=run" || true
