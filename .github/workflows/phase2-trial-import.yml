name: Phase 2 Trial Import

on:
  workflow_dispatch:

jobs:
  dry-run-only:
    runs-on: ubuntu-latest
    if: github.repository == 'yalabdullmohsen/majalis'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Dry-run Phase 2 trial import (never writes to production)
        run: |
          cd artifacts/majalis
          node scripts/import-phase2-trial.mjs --dry-run

      - name: Production guard tests
        run: |
          cd artifacts/majalis
          node scripts/test-public-no-demo-content.mjs
