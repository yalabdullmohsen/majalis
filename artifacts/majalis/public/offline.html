<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#153025" />
  <title>غير متصل — المجلس العلمي</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Tahoma, "Noto Naskh Arabic", sans-serif;
      min-height: 100svh;
      background: #FAF7F0;
      color: #1f1c17;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }

    .offline-card {
      background: #fff;
      border: 1px solid #e2ddd5;
      border-radius: 1.2rem;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,.07);
    }

    .offline-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
      background: #eef7f2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 800;
      color: #134a3a;
      margin-bottom: .6rem;
    }

    .subtitle {
      font-size: .92rem;
      color: #5c564c;
      line-height: 1.7;
      margin-bottom: 1.75rem;
    }

    .offline-actions {
      display: flex;
      flex-direction: column;
      gap: .6rem;
    }

    .btn {
      display: block;
      padding: .7rem 1.25rem;
      border-radius: .65rem;
      font-size: .9rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .btn--primary  { background: #166534; color: #fff; }
    .btn--secondary { background: #eef7f2; color: #134a3a; }

    .offline-cached {
      margin-top: 1.75rem;
      padding-top: 1.25rem;
      border-top: 1px solid #e2ddd5;
    }
    .offline-cached p {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #a19e96;
      margin-bottom: .75rem;
    }
    .cached-links {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      justify-content: center;
    }
    .cached-link {
      display: inline-block;
      padding: .3rem .75rem;
      border-radius: 999px;
      font-size: .82rem;
      font-weight: 600;
      background: #f3ede2;
      color: #134a3a;
      text-decoration: none;
      border: 1px solid #e2ddd5;
    }
    .cached-link:hover { background: #eef7f2; }

    .offline-footer {
      margin-top: 1.5rem;
      font-size: .75rem;
      color: #a19e96;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">📶</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p class="subtitle">
      تعذّر الاتصال بالمنصة. يمكنك الوصول إلى المحتوى المحفوظ مسبقاً على جهازك
      أو المحاولة مجدداً عند استعادة الاتصال.
    </p>

    <div class="offline-actions">
      <button class="btn btn--primary" onclick="window.location.reload()">
        إعادة المحاولة
      </button>
      <a href="/" class="btn btn--secondary">العودة للرئيسية</a>
    </div>

    <div class="offline-cached">
      <p>متاح دون اتصال</p>
      <div class="cached-links">
        <a href="/adhkar" class="cached-link">الأذكار</a>
        <a href="/quran" class="cached-link">المصحف</a>
        <a href="/prayer-times" class="cached-link">مواقيت الصلاة</a>
        <a href="/tasbih" class="cached-link">التسبيح</a>
        <a href="/daily-wird" class="cached-link">الورد اليومي</a>
      </div>
    </div>
  </div>

  <p class="offline-footer">المجلس العلمي — منصة العلوم الشرعية</p>
</body>
</html>
