<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#153025" />
  <meta name="robots" content="noindex, nofollow" />
  <title>الصفحة غير موجودة — المجلس العلمي</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Times New Roman", Times, serif;
      min-height: 100svh;
      background: #F0F5F2;
      color: #1F4D3A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }

    .nf-card {
      background: #fff;
      border: 1px solid rgba(31,77,58,0.15);
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(31,77,58,0.1);
    }

    .nf-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.25rem;
      background: #EEF7F2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      border: 2px solid rgba(31,77,58,0.12);
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 800;
      color: #1F4D3A;
      margin-bottom: .6rem;
    }

    .subtitle {
      font-size: .92rem;
      color: #4E6658;
      line-height: 1.75;
      margin-bottom: 1.75rem;
    }

    .nf-actions {
      display: flex;
      flex-direction: column;
      gap: .6rem;
    }

    .btn {
      display: block;
      padding: .75rem 1.25rem;
      border-radius: .75rem;
      font-size: .9rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: opacity .15s, transform .15s;
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn--primary  { background: #1F4D3A; color: #ffffff; }
    .btn--secondary { background: #EEF7F2; color: #1F4D3A; border: 1px solid rgba(31,77,58,0.2); }

    .nf-footer {
      margin-top: 1.5rem;
      font-size: .75rem;
      color: #4E6658;
    }
    .nf-footer a { color: #1F4D3A; font-weight: 700; }
  </style>
</head>
<body>
  <div class="nf-card">
    <div class="nf-icon">🔍</div>
    <h1>لم نجد هذه الصفحة</h1>
    <p class="subtitle">
      المسار الذي فتحته غير موجود، أو رقعت مادّته، أو نُقل موقعها. تحقق من
      الرابط أو انتقل إلى المكتبة أو صفحة العلماء للبحث عن المحتوى المطلوب.
    </p>

    <div class="nf-actions">
      <a href="/" class="btn btn--primary">العودة للرئيسية</a>
      <a href="/search" class="btn btn--secondary">البحث في المنصة</a>
    </div>

    <p class="nf-footer">
      وجدت رابطًا معطوبًا يستحق الإبلاغ؟ <a href="/contact">أخبرنا</a>.
    </p>
  </div>
</body>
</html>
