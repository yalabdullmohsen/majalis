<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="fg-emerald" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2E6A36"/>
      <stop offset="100%" stop-color="#1A4826"/>
    </linearGradient>
    <linearGradient id="fg-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8A55A"/>
      <stop offset="100%" stop-color="#795B25"/>
    </linearGradient>
  </defs>
  <!-- خلفية عاجية -->
  <rect width="100" height="100" rx="20" fill="#F4F3EE"/>
  <!-- الشريط الأخضر للقوس (يسار) -->
  <path d="M18,88 Q18,42 50,18" fill="none" stroke="url(#fg-emerald)" stroke-width="7" stroke-linecap="round"/>
  <!-- الشريط الذهبي للقوس (يمين) -->
  <path d="M82,88 Q82,42 50,18" fill="none" stroke="url(#fg-gold)" stroke-width="5" stroke-linecap="round"/>
  <!-- نقطة الذروة -->
  <circle cx="50" cy="18" r="3.5" fill="#A78747"/>
  <!-- كتاب مفتوح -->
  <path d="M24,80 Q50,72 76,80" fill="none" stroke="url(#fg-emerald)" stroke-width="3" stroke-linecap="round"/>
  <path d="M50,72 L50,84" stroke="#A78747" stroke-width="1.5" opacity="0.7"/>
  <!-- حرف م (مجالس) -->
  <text x="50" y="62"
        font-family="serif"
        font-size="28"
        font-weight="700"
        text-anchor="middle"
        fill="#795B25">م</text>
</svg>
