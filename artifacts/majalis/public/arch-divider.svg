  <!-- الجسم الرئيسي للقوس -->
  <path d="M0,56 Q150,56 450,10 Q510,2 560,1 Q580,0 600,0.5 Q620,0 640,1 Q690,2 750,10 Q1050,56 1200,56 Z"
