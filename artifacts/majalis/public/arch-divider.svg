<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 56" preserveAspectRatio="none">
  <defs>
    <linearGradient id="arch-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1A4826" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#1A4826" stop-opacity="0.45"/>
      <stop offset="48%"  stop-color="#2E6A36" stop-opacity="0.55"/>
      <stop offset="52%"  stop-color="#A78747" stop-opacity="0.55"/>
