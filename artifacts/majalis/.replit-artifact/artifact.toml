kind = "web"
previewPath = "/"
title = "مجالس"
version = "1.0.0"
id = "artifacts/majalis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24216

[services.development]
run = "pnpm --filter @workspace/majalis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/majalis", "run", "build" ]
publicDir = "artifacts/majalis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24216"
BASE_PATH = "/"
