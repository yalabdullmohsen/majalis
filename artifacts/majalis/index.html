    <script>
      try {
        /* مِشكاة: تطبيق الوضع (ليل/نهار) فوراً لمنع الوميض */
        /* ترحيل v4-light-2026: إعادة تعيين التفضيل عند أول تشغيل بعد تغيير الهوية */
        var _dsv = "v4-light-2026-naskh";
        if (localStorage.getItem("majalis-design-v") !== _dsv) {
          localStorage.setItem("majalis-design-v", _dsv);
          localStorage.removeItem("majalis-theme");
          localStorage.removeItem("majalis-font-preference");
          localStorage.removeItem("majalis-font-preference-v2");
        }
        /* المفتاح الحقيقي المستخدَم في theme-preference.ts هو "majalis-theme" —
           كان هذا المِشكاة يقرأ مفتاحًا مختلفًا ("majalis-theme-preference") لا
           يكتب إليه أي جزء آخر من التطبيق، فكان يُنتج وميض الوضع النهاري دومًا
           قبل أن يُصحِّحه React بعد الترطيب (2026-07-16). */
        var storedTheme = localStorage.getItem("majalis-theme");
        var resolved = storedTheme === "light" ? "light"
          : storedTheme === "dark" ? "dark"
          : storedTheme === "auto"
            ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
            : "light";
        document.documentElement.dataset.theme = resolved;
        document.documentElement.classList.toggle("dark", resolved === "dark");
        document.documentElement.style.colorScheme = resolved === "light" ? "light" : "dark";
        /* theme-color متزامن فورًا قبل الطلاء الأول (يطابق src/lib/theme-preference.ts) */
        var _themeMeta = document.querySelector('meta[name="theme-color"]');
        if (_themeMeta) _themeMeta.setAttribute("content", resolved === "dark" ? "#0D1A14" : "#FFFFFF");

        var storedFont = localStorage.getItem("majalis-font-preference-v2");
        document.documentElement.dataset.font =
          storedFont === "naskh" || storedFont === "default"
            ? storedFont
            : "naskh";
        document.body.classList.remove("side-nav-open", "navbar-more-open", "mobile-nav-body-lock");
        document.body.style.removeProperty("overflow");
        document.body.style.removeProperty("touch-action");
        document.querySelectorAll(".mobile-nav-layer").forEach(function (el) {
          el.remove();
        });
      } catch (error) {}
    </script>
