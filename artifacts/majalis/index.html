    <script>
      try {
        /* مِشكاة: تطبيق الوضع (ليل/نهار) فوراً لمنع الوميض */
        var storedTheme = localStorage.getItem("majalis-theme-preference");
        var resolved = storedTheme === "light" ? "light"
          : storedTheme === "dark" ? "dark"
          : (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
        document.documentElement.dataset.theme = resolved;
        document.documentElement.classList.toggle("dark", resolved === "dark");
        document.documentElement.style.colorScheme = resolved === "light" ? "light" : "dark";

        var storedFont = localStorage.getItem("majalis-font-preference");
        document.documentElement.dataset.font =
          storedFont === "ruqaa" || storedFont === "naskh" || storedFont === "default"
            ? storedFont
            : "default";
        document.body.classList.remove("side-nav-open", "navbar-more-open", "mobile-nav-body-lock");
        document.body.style.removeProperty("overflow");
        document.body.style.removeProperty("touch-action");
        document.querySelectorAll(".mobile-nav-layer").forEach(function (el) {
          el.remove();
        });
      } catch (error) {}
    </script>
