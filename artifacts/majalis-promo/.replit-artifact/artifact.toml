kind = "video"
previewPath = "/majalis-promo/"
title = "مجالس — فيديو ترويجي"
version = "1.0.0"
id = "artifacts/majalis-promo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/majalis-promo/" ]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/majalis-promo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/majalis-promo", "run", "build" ]
publicDir = "artifacts/majalis-promo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/majalis-promo/"
