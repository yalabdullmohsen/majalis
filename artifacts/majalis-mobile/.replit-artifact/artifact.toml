kind = "mobile"
previewPath = "/mobile/"
title = "مجالس العلم Mobile"
version = "1.0.0"
id = "artifacts/majalis-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 18881

[services.development]
run = "pnpm --filter @workspace/majalis-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/majalis-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/majalis-mobile", "run", "serve" ]

[services.env]
PORT = "18881"
BASE_PATH = "/mobile/"
